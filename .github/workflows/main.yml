export default function App() {
  const [activeTab, setActiveTab] = useState('home');

  // Logic for scroll to top on page change
  useEffect(() => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [activeTab]);

  const renderContent = () => {
    switch (activeTab) {
      case 'home': return <HomePage setActiveTab={setActiveTab} />;
      case 'exams': return <ExamHubPage />;
      case 'admissions': return <AdmissionPage />;
      case 'portal': return <PortalPage />;
      case 'academics':
        return (
          <div className="pt-32 pb-24 text-center">
            <SectionHeading title="Academics" subtitle="Our curriculum for Grades 6-12 is currently being optimized for 2026. Check back soon for detailed course maps." />
            <div className="flex justify-center py-20">
              <div className="w-20 h-20 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <Button onClick={() => setActiveTab('home')}>Back Home</Button>
          </div>
        );
      default: return <HomePage setActiveTab={setActiveTab} />;
    }
  };

  return (
    <div className="min-h-screen bg-white text-slate-900 selection:bg-indigo-100 selection:text-indigo-900">
      <GlobalStyles />
      {/* Top Banner */}
      <div className="bg-indigo-700 text-white text-[10px] md:text-xs font-black uppercase tracking-[0.2em] py-2 text-center flex items-center justify-center gap-3">
        <Bell size={14} className="animate-pulse" />
        Fall 2026 Scholarship Window is now open for Grades 6-12. Deadline: July 15.
      </div>

      <Navbar activeTab={activeTab} setActiveTab={setActiveTab} />
      
      <main>
        {renderContent()}
      </main>

      <Footer />
      
      {/* Scroll Progress Bar placeholder */}
      <div className="fixed top-0 left-0 h-1 bg-indigo-500 z-[60] transition-all duration-300" 
           style={{ width: '0%' }} id="scroll-bar"></div>
    </div>
  );
}

// Inline Tailwind-esque animations
const GlobalStyles = () => (
  <style>{`
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-bounce-slow { animation: bounce-slow 3s infinite ease-in-out; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in 0.6s ease-out forwards; }
  `}</style>
);

