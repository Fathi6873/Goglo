);

const ExamHubPage = () => {
  const [filter, setFilter] = useState('All');
  const years = ['All', '2025', '2024', '2023', '2022'];
  
  const exams = [
    { id: 1, title: 'Pure Mathematics', year: '2025', grade: 'Grade 12', type: 'Final', size: '1.2MB' },
    { id: 2, title: 'Advanced Chemistry', year: '2025', grade: 'Grade 11', type: 'Mid-term', size: '1.4MB' },
    { id: 3, title: 'Physical Sciences', year: '2024', grade: 'Grade 10', type: 'Final', size: '2.1MB' },
    { id: 4, title: 'Life Skills & Ethics', year: '2024', grade: 'Grade 9', type: 'Mock', size: '1.5MB' },
    { id: 5, title: 'Social Studies', year: '2023', grade: 'Grade 8', type: 'Final', size: '950KB' },
    { id: 6, title: 'Creative Arts', year: '2023', grade: 'Grade 7', type: 'Final', size: '1.1MB' },
    { id: 7, title: 'Basic Mathematics', year: '2025', grade: 'Grade 6', type: 'Mid-term', size: '700KB' },
  ];

  const filteredExams = filter === 'All' ? exams : exams.filter(e => e.year === filter);

  return (
    <div className="pt-32 pb-24 bg-slate-50 min-h-screen">
      <div className="max-w-7xl mx-auto px-4">
        <SectionHeading 
          title="Examination Archive" 
          subtitle="Study from the past to secure your future. Access previous years' papers and marking schemes for Grades 6 through 12."
        />
        
        {/* Filter Bar */}
        <div className="flex flex-wrap justify-center gap-3 mb-12">
          {years.map(y => (
            <button
              key={y}
              onClick={() => setFilter(y)}
              className={`px-6 py-2 rounded-full font-bold transition-all ${
                filter === y 
                ? 'bg-indigo-600 text-white shadow-lg' 
                : 'bg-white text-slate-600 hover:bg-indigo-50 border border-gray-200'
              }`}
            >
              {y === 'All' ? 'All Years' : y}
            </button>
          ))}
        </div>

        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
          {filteredExams.map(exam => (
            <div key={exam.id} className="bg-white p-8 rounded-3xl border border-gray-100 hover:shadow-xl transition-all group">
              <div className="flex justify-between items-start mb-6">
                <div className="bg-indigo-50 text-indigo-600 p-3 rounded-2xl">
                  <FileText size={24} />
                </div>
                <span className="bg-slate-100 text-slate-600 text-[10px] font-black uppercase tracking-tighter px-3 py-1 rounded-full">
                  {exam.year} Session
                </span>
              </div>
              <h3 className="text-xl font-bold text-slate-900 mb-1">{exam.title}</h3>
              <p className="text-slate-500 text-sm mb-6 flex items-center gap-2">
                <Users size={14} /> {exam.grade} • {exam.type}
              </p>
              <div className="pt-6 border-t border-gray-50 flex items-center justify-between">
                <span className="text-xs text-slate-400 font-medium">{exam.size} PDF</span>
                <button className="flex items-center gap-2 text-indigo-600 font-bold group-hover:underline">
                  Download <Download size={18} />
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

