import React, { useState, useEffect } from 'react';
import { 
  Menu, X, Calendar, BookOpen, User, Users, FileText, 
  MapPin, Phone, Mail, ChevronRight, GraduationCap, 
  Bell, Search, Download, Clock, Award, CheckCircle,
  ArrowRight, ShieldCheck, Globe, Star
} from 'lucide-react';

/**
 * GOGLO SCHOOL WEBSITE - COMPLETE IMPLEMENTATION
 * Features:
 * 1. Multi-page navigation (Home, Academics, Admissions, Exam Hub, Portals)
 * 2. Exam Archive (Previous years resources for Grades 6-12)
 * 3. Mobile-responsive design
 * 4. Admission Inquiry Form (Grade 6-12 selection)
 * 5. Interactive Portals
 */

// --- SHARED UI COMPONENTS ---

const Button = ({ children, variant = 'primary', className = '', onClick }) => {
  const variants = {
    primary: 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md',
    secondary: 'bg-white text-indigo-900 border border-gray-200 hover:bg-gray-50',
    outline: 'border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50',
    ghost: 'text-gray-600 hover:text-indigo-600 hover:bg-indigo-50'
  };

  return (
    <button 
      onClick={onClick}
      className={`px-6 py-2.5 rounded-xl font-bold transition-all active:scale-95 disabled:opacity-50 ${variants[variant]} ${className}`}
    >
      {children}
    </button>
  );
};

const SectionHeading = ({ title, subtitle, light = false }) => (
  <div className="text-center mb-16 px-4">
    <h2 className={`text-3xl md:text-5xl font-extrabold mb-4 ${light ? 'text-white' : 'text-slate-900'}`}>
      {title}
    </h2>
    <div className={`w-24 h-1.5 mx-auto rounded-full mb-6 ${light ? 'bg-white/30' : 'bg-indigo-600'}`}></div>
    <p className={`max-w-2xl mx-auto text-lg ${light ? 'text-indigo-100' : 'text-slate-600'}`}>
      {subtitle}
    </p>
  </div>
);

// --- PAGE SECTIONS ---

const Navbar = ({ activeTab, setActiveTab }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const handleScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const menuItems = [
    { id: 'home', label: 'Home' },
    { id: 'academics', label: 'Academics' },
    { id: 'exams', label: 'Exam Hub' },
    { id: 'admissions', label: 'Admissions' },
    { id: 'portal', label: 'Portals' }
  ];

  return (
    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${
      scrolled ? 'bg-white shadow-xl py-3' : 'bg-white/95 backdrop-blur-sm py-5'
    }`}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div className="flex justify-between items-center">
          <div 
            className="flex items-center space-x-2 cursor-pointer group"
            onClick={() => setActiveTab('home')}
          >
            <div className="bg-indigo-600 p-2 rounded-xl group-hover:rotate-12 transition-transform">
              <GraduationCap className="text-white w-8 h-8" />
            </div>
            <span className="text-2xl font-black text-slate-900 tracking-tighter">GOGLO</span>
          </div>
          
          <div className="hidden lg:flex items-center space-x-1">
            {menuItems.map((item) => (
              <button
                key={item.id}
                onClick={() => setActiveTab(item.id)}
                className={`px-4 py-2 text-sm font-bold rounded-lg transition-all ${
                  activeTab === item.id 
                    ? 'text-indigo-600 bg-indigo-50' 
                    : 'text-slate-600 hover:text-indigo-600 hover:bg-gray-50'
                }`}
              >
                {item.label}
              </button>
            ))}
            <div className="pl-4">
              <Button onClick={() => setActiveTab('admissions')}>Apply Now</Button>
            </div>
          </div>

          <button onClick={() => setIsOpen(!isOpen)} className="lg:hidden p-2 text-slate-900">
            {isOpen ? <X size={28} /> : <Menu size={28} />}
          </button>
        </div>
      </div>

      {/* Mobile Menu */}
      {isOpen && (
        <div className="lg:hidden bg-white border-t mt-3 absolute w-full shadow-2xl animate-fade-in">
          <div className="px-4 py-6 space-y-2">
            {menuItems.map((item) => (
              <button
                key={item.id}
                onClick={() => { setActiveTab(item.id); setIsOpen(false); }}
                className={`block w-full text-left px-4 py-4 rounded-xl text-lg font-bold ${
                  activeTab === item.id ? 'bg-indigo-600 text-white' : 'text-slate-700 hover:bg-gray-100'
                }`}
              >
                {item.label}
              </button>
            ))}
            <div className="pt-4">
              <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl shadow-lg">
                APPLY FOR 2026
              </button>
            </div>
          </div>
        </div>
      )}
    </nav>
  );
};

const HomePage = ({ setActiveTab }) => (
