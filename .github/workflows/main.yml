          <div className="text-indigo-200 font-bold uppercase tracking-widest text-xs">Specialties</div>
        </div>
      </div>
    </section>

    {/* Core Pillars */}
    <section className="py-24 bg-white">
      <div className="max-w-7xl mx-auto px-4">
        <SectionHeading 
          title="The Goglo Advantage" 
          subtitle="We focus on more than just grades. We build characters, leaders, and innovators."
        />
        <div className="grid md:grid-cols-3 gap-12">
          {[
            { icon: ShieldCheck, title: 'Safe Environment', desc: 'State-of-the-art secure campus with 24/7 monitoring and wellness support.', color: 'text-blue-600', bg: 'bg-blue-50' },
            { icon: Globe, title: 'Global Exposure', desc: 'Partnerships with Ivy League universities and international exchange programs.', color: 'text-indigo-600', bg: 'bg-indigo-50' },
            { icon: Award, title: 'Excellence Guaranteed', desc: 'Rigorous curriculum designed by global industry experts and PhD educators.', color: 'text-amber-600', bg: 'bg-amber-50' }
          ].map((item, i) => (
            <div key={i} className="p-10 rounded-3xl border border-gray-100 hover:shadow-2xl transition-all duration-300 group">
              <div className={`${item.bg} ${item.color} w-16 h-16 rounded-2xl flex items-center justify-center mb-8 group-hover:scale-110 transition-transform`}>
